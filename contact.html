<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="株式会社 工運へのお問い合わせフォーム。工事のご相談・お見積り・採用に関するお問い合わせはこちらから。"
    />
    <title>お問い合わせ | 株式会社 工運</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <a href="index.html" class="logo">
          <img src="images/logo6.png" alt="株式会社 工運" class="logo-img" />
        </a>

        <nav class="nav" id="nav" aria-label="メインナビゲーション">
          <a href="index.html">トップ</a>
          <a href="index.html#service">事業内容</a>
          <a href="index.html#strength">工運の強み</a>
          <a href="works.html">実績紹介</a>
          <a href="index.html#about">会社案内</a>
          <a href="recruit.html">採用情報</a>
        </nav>

        <div class="header-actions">
          <a href="index.html" class="btn btn-outline btn-sm">サイトトップ</a>
          <button
            class="menu-toggle"
            type="button"
            aria-label="メニューを開く"
            aria-expanded="false"
            aria-controls="nav"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </div>
    </header>

    <main class="contact-page">
      <div class="container contact-page-inner">
        <header class="contact-page-header">
          <h1 class="section-title-en">CONTACT</h1>
          <p class="section-title-ja">お問い合わせ</p>
          <p class="contact-page-lead">
            工事のご相談・お見積り・採用に関するお問い合わせは、下記フォームよりお送りください。内容を確認のうえ、担当よりご連絡いたします。
          </p>
          <p class="contact-page-tel">
            お急ぎの方は TEL <a href="tel:0337597211">03-3759-7211</a>（本社）までご連絡ください。
          </p>
        </header>

        <form
          class="contact-form"
          id="contact-form"
          action="https://formsubmit.co/j-shimazaki@kouun.co.jp"
          method="POST"
        >
          <input type="hidden" name="_subject" value="【工運サイト】お問い合わせ" />
          <input type="hidden" name="_template" value="table" />
          <input type="hidden" name="_captcha" value="false" />
          <input type="hidden" name="_next" id="contact-next" value="" />
          <input type="text" name="_honey" class="contact-honey" tabindex="-1" autocomplete="off" />

          <div class="contact-form-grid">
            <div class="contact-field">
              <label for="contact-name">お名前 <span class="contact-required">必須</span></label>
              <input type="text" id="contact-name" name="お名前" required autocomplete="name" />
            </div>

            <div class="contact-field">
              <label for="contact-company">会社名</label>
              <input type="text" id="contact-company" name="会社名" autocomplete="organization" />
            </div>

            <div class="contact-field">
              <label for="contact-email">メールアドレス <span class="contact-required">必須</span></label>
              <input type="email" id="contact-email" name="email" required autocomplete="email" />
            </div>

            <div class="contact-field">
              <label for="contact-phone">電話番号</label>
              <input type="tel" id="contact-phone" name="電話番号" autocomplete="tel" />
            </div>
          </div>

          <div class="contact-field">
            <label for="contact-message">お問い合わせ内容 <span class="contact-required">必須</span></label>
            <textarea id="contact-message" name="お問い合わせ内容" rows="8" required></textarea>
          </div>

          <div class="contact-form-actions">
            <button type="submit" class="btn btn-primary">送信する</button>
            <p class="contact-form-note">
              送信後、初回のみ確認メールが届く場合があります。迷惑メールフォルダもご確認ください。
            </p>
          </div>
        </form>
      </div>
    </main>

    <footer class="footer footer-compact">
      <p class="footer-copy">&copy;2026 kouun Inc.</p>
    </footer>

    <script src="js/main.js"></script>
    <script>
      (function () {
        var next = document.getElementById("contact-next");
        if (!next) return;
        var thanks = new URL("contact-thanks.html", window.location.href).href;
        next.value = thanks;
      })();
    </script>
  </body>
</html>
