<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="幸運（kouun）公式サイト" />
    <title>幸運 | 公式サイト</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container header-inner">
        <a href="#" class="logo">幸運</a>
        <nav class="nav">
          <a href="#about">会社概要</a>
          <a href="#service">事業内容</a>
          <a href="#contact">お問い合わせ</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container hero-inner">
          <p class="hero-label">Official Website</p>
          <h1>幸運</h1>
          <p class="hero-lead">
            人と人とのつながりから、新しい価値をつくる。
          </p>
        </div>
      </section>

      <section id="about" class="section">
        <div class="container">
          <h2>会社概要</h2>
          <dl class="info-list">
            <div class="info-row">
              <dt>会社名</dt>
              <dd>幸運（kouun）</dd>
            </div>
            <div class="info-row">
              <dt>所在地</dt>
              <dd>（記載予定）</dd>
            </div>
            <div class="info-row">
              <dt>事業内容</dt>
              <dd>（記載予定）</dd>
            </div>
          </dl>
        </div>
      </section>

      <section id="service" class="section section-alt">
        <div class="container">
          <h2>事業内容</h2>
          <p class="section-text">
            事業内容の詳細はこちらに記載します。テキストや画像は後から差し替え可能です。
          </p>
        </div>
      </section>

      <section id="contact" class="section">
        <div class="container">
          <h2>お問い合わせ</h2>
          <p class="section-text">
            お問い合わせはメールにて受け付けております。
          </p>
          <a class="contact-link" href="mailto:info@example.com">info@example.com</a>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <p>&copy; 2026 幸運</p>
      </div>
    </footer>
  </body>
</html>
